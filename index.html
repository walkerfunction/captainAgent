    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>captainAgent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --surface: #0c0d12;
            --surface-2: #12141c;
            --border: #1c1f2b;
            --text: #f0f1f5;
            --text-2: #9298ad;
            --text-3: #5c6178;
            --accent: #8b7cf7;
            --accent-glow: rgba(139,124,247,0.15);
            --green: #4ade80;
            --red: #f87171;
            --amber: #fbbf24;
            --cyan: #22d3ee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* === NAV === */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5,5,7,0.8);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem; height: 48px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-inner {
            width: 100%; max-width: 800px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
        .logo-mark {
            width: 22px; height: 22px; border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            display: grid; place-items: center;
            font-size: 9px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
        }
        .logo-name { font-size: 13px; font-weight: 700; letter-spacing: -0.03em; }
        .nav-meta { font-size: 11px; color: var(--text-3); }

        /* === HERO === */
        .hero {
            max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem 1rem;
            text-align: center;
        }
        .match-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 100px; padding: 5px 14px;
            font-size: 11px; color: var(--text-2); font-weight: 500;
            margin-bottom: 1.25rem;
        }
        .match-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .vs-block {
            display: flex; align-items: center; justify-content: center; gap: 1.5rem;
            margin-bottom: 1rem;
        }
        .team-name {
            font-size: 2.5rem; font-weight: 900; letter-spacing: -0.05em;
            line-height: 1;
        }
        .team-name.t1 { color: var(--accent); }
        .team-name.t2 { color: var(--cyan); }
        .vs-divider {
            font-size: 0.85rem; font-weight: 600; color: var(--text-3);
            padding: 4px 8px; border-radius: 6px;
            background: var(--surface-2); border: 1px solid var(--border);
        }
        .match-meta { font-size: 0.82rem; color: var(--text-3); margin-top: 0.25rem; }

        /* === LIVE SCORE === */
        .live-wrap { max-width: 800px; margin: 1rem auto 0; padding: 0 1.5rem; }
        .live-card {
            background: linear-gradient(135deg, rgba(248,113,113,0.08), rgba(251,191,36,0.05));
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 16px; padding: 1.25rem;
            position: relative; overflow: hidden;
        }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.14em; color: var(--red);
            margin-bottom: 0.6rem;
        }
        .live-badge .pulse {
            width: 7px; height: 7px; border-radius: 50%; background: var(--red);
            box-shadow: 0 0 0 0 rgba(248,113,113,0.7);
            animation: livepulse 1.5s infinite;
        }
        @keyframes livepulse {
            0% { box-shadow: 0 0 0 0 rgba(248,113,113,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
            100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
        }
        .live-score {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
            line-height: 1.2; margin-bottom: 0.6rem;
        }
        .live-details {
            display: flex; flex-wrap: wrap; gap: 0.75rem 1.5rem;
            font-size: 0.8rem; color: var(--text-2);
        }
        .live-details span strong { color: var(--text); font-weight: 600; }
        .live-moment {
            margin-top: 0.75rem; padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            font-size: 0.83rem; color: var(--amber); font-weight: 500;
        }

        /* === VERDICT === */
        .verdict-wrap {
            max-width: 800px; margin: 1.5rem auto 0; padding: 0 1.5rem;
        }
        .verdict {
            background: linear-gradient(135deg, rgba(139,124,247,0.08), rgba(34,211,238,0.05));
            border: 1px solid rgba(139,124,247,0.2);
            border-radius: 16px; padding: 1.5rem;
            text-align: center; position: relative; overflow: hidden;
        }
        .verdict::before {
            content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        .verdict-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--accent); margin-bottom: 0.5rem;
        }
        .verdict-text {
            font-size: 1.35rem; font-weight: 700; letter-spacing: -0.03em;
            line-height: 1.3;
        }

        /* === FORM STRIP === */
        .form-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .form-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.1rem;
        }
        .form-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.6rem;
        }
        .form-team { font-size: 0.8rem; font-weight: 700; }
        .form-record { font-size: 0.72rem; color: var(--text-3); font-weight: 500; }
        .form-dots { display: flex; gap: 5px; margin-bottom: 0.75rem; }
        .form-dot {
            width: 28px; height: 28px; border-radius: 8px;
            display: grid; place-items: center;
            font-size: 11px; font-weight: 700;
        }
        .form-dot.W { background: rgba(74,222,128,0.15); color: var(--green); }
        .form-dot.L { background: rgba(248,113,113,0.15); color: var(--red); }
        .form-dot.NR { background: rgba(92,97,120,0.15); color: var(--text-3); }
        .form-player { font-size: 0.78rem; color: var(--text-2); }
        .form-player strong { color: var(--text); font-weight: 600; }

        /* === INSIGHT CARDS === */
        .cards-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .section-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 0.75rem;
        }
        .cards-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .insight-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.1rem;
            transition: border-color 0.2s, transform 0.2s;
            cursor: default;
        }
        .insight-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        .card-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .card-title {
            font-size: 0.85rem; font-weight: 700; letter-spacing: -0.02em;
            margin-bottom: 0.35rem;
        }
        .card-body { font-size: 0.78rem; color: var(--text-2); line-height: 1.55; }
        .card-tag {
            display: inline-block; margin-top: 0.5rem;
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; padding: 2px 8px; border-radius: 100px;
        }
        .card-tag.positive { background: rgba(74,222,128,0.12); color: var(--green); }
        .card-tag.negative { background: rgba(248,113,113,0.12); color: var(--red); }
        .card-tag.neutral { background: rgba(146,152,173,0.12); color: var(--text-2); }
        .card-tag.danger { background: rgba(251,191,36,0.12); color: var(--amber); }

        /* === WATCHLIST === */
        .watchlist-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .watchlist {
            display: flex; flex-direction: column; gap: 6px;
        }
        .watch-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.85rem 1rem;
        }
        .watch-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--surface-2), var(--border));
            display: grid; place-items: center;
            font-size: 14px; font-weight: 800; color: var(--text-3);
            flex-shrink: 0;
        }
        .watch-info { flex: 1; min-width: 0; }
        .watch-name { font-size: 0.82rem; font-weight: 700; }
        .watch-team { font-size: 0.7rem; color: var(--text-3); }
        .watch-insight { font-size: 0.78rem; color: var(--text-2); text-align: right; }

        /* === PLAYING XI === */
        .xi-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .xi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .xi-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1rem;
        }
        .xi-team-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 0.6rem; }
        .xi-player {
            display: flex; align-items: center; gap: 8px;
            padding: 3px 0; font-size: 0.75rem; color: var(--text-2);
        }
        .xi-num {
            width: 18px; text-align: center;
            font-size: 0.65rem; color: var(--text-3); font-weight: 600;
        }

        /* === PITCH === */
        .pitch-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .pitch-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.1rem;
            font-size: 0.82rem; color: var(--text-2); line-height: 1.6;
        }
        .pitch-card strong { color: var(--text); }

        /* === SOURCES === */
        .sources-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .sources-list { display: flex; flex-direction: column; gap: 4px; }
        .source-link {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.6rem 0.85rem;
            text-decoration: none; color: var(--text-2);
            font-size: 0.75rem; transition: border-color 0.15s;
        }
        .source-link:hover { border-color: var(--accent); color: var(--text); }
        .source-num {
            font-size: 0.65rem; color: var(--text-3); font-weight: 700;
            font-family: monospace;
        }
        .source-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .source-domain { color: var(--text-3); font-size: 0.68rem; }

        /* === NO MATCHES === */
        .empty-state {
            max-width: 800px; margin: 0 auto; padding: 6rem 1.5rem;
            text-align: center;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.85rem; color: var(--text-3); }

        /* === FOOTER === */
        footer {
            max-width: 800px; margin: 3rem auto 0; padding: 1.25rem 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.7rem; color: var(--text-3);
        }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .team-name { font-size: 1.6rem; }
            .vs-block { gap: 0.75rem; }
            .verdict-text { font-size: 1.1rem; }
            .form-row { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: 1fr; }
            .hero { padding: 2rem 1rem 0.75rem; }
            .xi-row { grid-template-columns: 1fr; }
            .form-section, .cards-section, .watchlist-section, .verdict-wrap, .xi-section, .pitch-section { padding: 0 1rem; }
            footer { padding: 1.25rem 1rem 2rem; flex-direction: column; gap: 4px; text-align: center; }
        }
    </style>

function initials(name) {
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function shortTeam(name) {
    const map = {
        "Sunrisers Hyderabad": "SRH", "Lucknow Super Giants": "LSG",
        "Chennai Super Kings": "CSK", "Mumbai Indians": "MI",
        "Royal Challengers Bengaluru": "RCB", "Kolkata Knight Riders": "KKR",
        "Rajasthan Royals": "RR", "Delhi Capitals": "DC",
        "Punjab Kings": "PBKS", "Gujarat Titans": "GT",
    };
    return map[name] || name.split(" ").map(w => w[0]).join("");
}

function renderMatch(analysis) {
    const m = analysis.match;
    const s = analysis.structured || {};
    const teams = m.teams || [];
    const t1 = shortTeam(teams[0] || "TBD");
    const t2 = shortTeam(teams[1] || "TBD");

    let html = "";

    const isLive = (m.status === "live");

    // Hero
    html += `
    <div class="hero">
        <div class="match-badge">
            <span class="dot"></span>
            ${isLive ? "LIVE" : (m.match_type || "T20")} &middot; ${m.name || ""}
        </div>
        <div class="vs-block">
            <span class="team-name t1">${t1}</span>
            <span class="vs-divider">vs</span>
            <span class="team-name t2">${t2}</span>
        </div>
        <div class="match-meta">${m.venue || ""}${m.start_time_ist && !isLive ? " &middot; " + m.start_time_ist : ""}</div>
    </div>`;

    // Live score (only for in-progress matches)
    if (isLive && m.live_score) {
        html += `
        <div class="live-wrap">
            <div class="live-card">
                <div class="live-badge"><span class="pulse"></span>LIVE</div>
                <div class="live-score">${m.live_score}</div>
                <div class="live-details">
                    ${m.live_batting ? `<span>&#127951; <strong>${m.live_batting}</strong></span>` : ""}
                    ${m.live_bowling ? `<span>&#9917; <strong>${m.live_bowling}</strong></span>` : ""}
                </div>
                ${m.live_moment ? `<div class="live-moment">${m.live_moment}</div>` : ""}
            </div>
        </div>`;
    }

    // Verdict
    if (s.verdict) {
        html += `
        <div class="verdict-wrap">
            <div class="verdict">
                <div class="verdict-label">AI Verdict</div>
                <div class="verdict-text">${s.verdict}</div>
            </div>
        </div>`;
    }

    // Form
    if (s.team1 || s.team2) {
        html += `<div class="form-section"><div class="form-row">`;
        [s.team1, s.team2].forEach((team, i) => {
            if (!team) return;
            const form = (team.form || []).slice(0, 5);
            html += `
            <div class="form-card">
                <div class="form-header">
                    <span class="form-team">${shortTeam(team.name)}</span>
                    <span class="form-record">${team.key_stat || ""}</span>
                </div>
                <div class="form-dots">
                    ${form.map(f => `<div class="form-dot ${f}">${f}</div>`).join("")}
                </div>
                <div class="form-player"><strong>${team.key_player || ""}</strong> ${team.key_player_stat || ""}</div>
            </div>`;
        });
        html += `</div></div>`;
    }

    // Insight Cards
    const cards = s.cards || [];
    if (cards.length > 0) {
        html += `
        <div class="cards-section">
            <div class="section-label">Insights</div>
            <div class="cards-grid">
                ${cards.map(c => `
                <div class="insight-card">
                    <div class="card-icon">${c.emoji || ""}</div>
                    <div class="card-title">${c.title || ""}</div>
                    <div class="card-body">${c.body || ""}</div>
                    <span class="card-tag ${c.sentiment || "neutral"}">${c.type || ""}</span>
                </div>`).join("")}
            </div>
        </div>`;
    }

    // Playing XI (from news)
    const news = analysis.news || {};
    const xi = news.playing_xi || {};
    const xiTeams = Object.keys(xi);
    if (xiTeams.length >= 2) {
        html += `
        <div class="xi-section">
            <div class="section-label">Predicted Playing XI</div>
            <div class="xi-row">
                ${xiTeams.slice(0, 2).map(teamName => `
                <div class="xi-card">
                    <div class="xi-team-name">${shortTeam(teamName)}</div>
                    ${(xi[teamName] || []).map((p, i) => `
                    <div class="xi-player">
                        <span class="xi-num">${i + 1}</span>
                        <span>${p}</span>
                    </div>`).join("")}
                </div>`).join("")}
            </div>
        </div>`;
    }

    // Pitch report (from news)
    if (news.pitch_report) {
        html += `
        <div class="pitch-section">
            <div class="section-label">Pitch & Conditions</div>
            <div class="pitch-card">${news.pitch_report}</div>
        </div>`;
    }

    // Sources (crawled links)
    const sources = (news.sources || []).slice(0, 8);
    if (sources.length > 0) {
        html += `
        <div class="sources-section">
            <div class="section-label">Sources Read &middot; ${sources.length} link${sources.length > 1 ? "s" : ""}</div>
            <div class="sources-list">
                ${sources.map((src, i) => {
                    let domain = "";
                    try { domain = new URL(src.url).hostname.replace(/^www\./, ""); } catch (e) {}
                    return `
                <a class="source-link" href="${src.url}" target="_blank" rel="noopener">
                    <span class="source-num">${String(i + 1).padStart(2, "0")}</span>
                    <span class="source-title">${src.title || src.url}</span>
                    <span class="source-domain">${domain}</span>
                </a>`;
                }).join("")}
            </div>
        </div>`;
    }

    // Watchlist
    const watchlist = s.watchlist || [];
    if (watchlist.length > 0) {
        html += `
        <div class="watchlist-section">
            <div class="section-label">Players to Watch</div>
            <div class="watchlist">
                ${watchlist.map(w => `
                <div class="watch-item">
                    <div class="watch-avatar">${initials(w.player || "?")}</div>
                    <div class="watch-info">
                        <div class="watch-name">${w.player || ""}</div>
                        <div class="watch-team">${w.team || ""}</div>
                    </div>
                    <div class="watch-insight">${w.insight || ""}</div>
                </div>`).join("")}
            </div>
        </div>`;
    }

    return html;
}

function render() {
    const app = document.getElementById("app");
    const analyses = DATA.analyses || [];

    if (analyses.length === 0) {
        app.innerHTML = `
        <div class="empty-state">
            <div class="icon">&#127951;</div>
            <h2>No matches today</h2>
            <p>Check back on match days for AI-powered pre-match intelligence.</p>
        </div>`;
        return;
    }

    app.innerHTML = analyses.map(renderMatch).join("");
}

// Nav date
function updateNav() {
    const now = new Date();
    document.getElementById("nav-date").textContent =
        now.toLocaleDateString("en-IN", { day: "numeric", month: "short", timeZone: "Asia/Kolkata" }) +
        " \u00b7 " +
        now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Kolkata" }) + " IST";

    // Next update: pipeline runs every 15 min via cron (at :02, :17, :32, :47)
    const SLOTS = [2, 17, 32, 47];
    const next = new Date(now);
    const curMin = next.getMinutes();
    let slot = SLOTS.find(s => s > curMin);
    if (slot === undefined) {
        next.setHours(next.getHours() + 1);
        slot = SLOTS[0];
    }
    next.setMinutes(slot, 0, 0);
    const mins = Math.max(0, Math.round((next - now) / 60000));
    document.getElementById("nav-next").textContent = "next update in " + mins + "m";
}
updateNav();
setInterval(updateNav, 30000);

render();
</script>

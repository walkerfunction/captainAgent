<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>captainAgent</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2312141c'/%3E%3Cpath d='M5 16 Q5 5 16 5 Q27 5 27 16 Z' fill='%238b7cf7'/%3E%3Crect x='5' y='16' width='22' height='2' fill='%236d5fd6'/%3E%3Cpath d='M3 18 Q16 24 29 18 L29 20 Q16 25 3 20 Z' fill='%236d5fd6'/%3E%3Ccircle cx='11' cy='11' r='1.5' fill='%23fff'/%3E%3Ccircle cx='16' cy='11' r='1.5' fill='%23fff'/%3E%3Ccircle cx='21' cy='11' r='1.5' fill='%23fff'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --surface: #0c0d12;
            --surface-2: #12141c;
            --border: #1c1f2b;
            --text: #f0f1f5;
            --text-2: #9298ad;
            --text-3: #5c6178;
            --accent: #8b7cf7;
            --accent-glow: rgba(139,124,247,0.15);
            --green: #4ade80;
            --red: #f87171;
            --amber: #fbbf24;
            --cyan: #22d3ee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
        }

        /* === NAV === */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5,5,7,0.8);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem; height: 48px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-inner {
            width: 100%; max-width: 800px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
        .logo-mark {
            width: 24px; height: 24px; display: grid; place-items: center;
        }
        .logo-mark svg { width: 100%; height: 100%; display: block; }
        .logo-name { font-size: 13px; font-weight: 700; letter-spacing: -0.03em; }
        .nav-meta { font-size: 11px; color: var(--text-3); }

        /* === TENANT PILLS === */
        .tenant-strip {
            display: flex; gap: 6px; align-items: center;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .tenant-pill {
            font-family: inherit; font-size: 11px; font-weight: 600;
            padding: 4px 12px; border-radius: 100px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-3); cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .tenant-pill:hover { border-color: var(--text-3); color: var(--text-2); }
        .tenant-pill.tenant-active {
            background: var(--accent); border-color: var(--accent);
            color: #fff;
        }
        @media (max-width: 640px) {
            .tenant-strip { position: static; transform: none; }
            .nav-inner { flex-wrap: wrap; justify-content: center; gap: 6px; height: auto; padding: 8px 0; }
            .tenant-pill { font-size: 10px; padding: 3px 10px; }
        }

        /* === HERO === */
        .hero {
            max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem 1rem;
            text-align: center;
        }
        .match-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 100px; padding: 5px 14px;
            font-size: 11px; color: var(--text-2); font-weight: 500;
            margin-bottom: 1.25rem;
        }
        .match-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .vs-block {
            display: flex; align-items: center; justify-content: center; gap: 1.5rem;
            margin-bottom: 1rem;
        }
        .team-name {
            font-size: 2.5rem; font-weight: 900; letter-spacing: -0.05em;
            line-height: 1;
        }
        .team-name.t1 { color: var(--accent); }
        .team-name.t2 { color: var(--cyan); }
        .vs-divider {
            font-size: 0.85rem; font-weight: 600; color: var(--text-3);
            padding: 4px 8px; border-radius: 6px;
            background: var(--surface-2); border: 1px solid var(--border);
        }
        .match-meta { font-size: 0.82rem; color: var(--text-3); margin-top: 0.25rem; }

        /* === LIVE SCORE === */
        .live-wrap { max-width: 800px; margin: 1rem auto 0; padding: 0 1.5rem; }
        .live-card {
            background: linear-gradient(135deg, rgba(248,113,113,0.08), rgba(251,191,36,0.05));
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 16px; padding: 1.25rem;
            position: relative; overflow: hidden;
        }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.14em; color: var(--red);
            margin-bottom: 0.6rem;
        }
        .live-badge .pulse {
            width: 7px; height: 7px; border-radius: 50%; background: var(--red);
            box-shadow: 0 0 0 0 rgba(248,113,113,0.7);
            animation: livepulse 1.5s infinite;
        }
        @keyframes livepulse {
            0% { box-shadow: 0 0 0 0 rgba(248,113,113,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
            100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
        }
        .live-score {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
            line-height: 1.2; margin-bottom: 0.6rem;
        }
        .live-details {
            display: flex; flex-wrap: wrap; gap: 0.75rem 1.5rem;
            font-size: 0.8rem; color: var(--text-2);
        }
        .live-details span strong { color: var(--text); font-weight: 600; }
        .live-moment {
            margin-top: 0.75rem; padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            font-size: 0.83rem; color: var(--amber); font-weight: 500;
        }

        /* === MATCH PICKER (horizontal scroll) === */
        .picker-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 0.75rem 1.25rem;
            scrollbar-width: none;
        }
        .picker-strip::-webkit-scrollbar { display: none; }
        .pick-card {
            flex-shrink: 0;
            scroll-snap-align: start;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 0.7rem 0.9rem;
            min-width: 150px;
            max-width: 180px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            font-family: inherit;
            text-align: left;
            color: var(--text);
        }
        .pick-card:hover { border-color: var(--text-3); transform: translateY(-1px); }
        .pick-card.pick-active {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(139,124,247,0.1), var(--surface));
        }
        .pick-teams {
            font-size: 0.95rem; font-weight: 800; letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .pick-meta {
            font-size: 0.65rem; color: var(--text-3); font-weight: 500;
        }
        .pick-status {
            display: inline-block;
            font-size: 0.55rem; font-weight: 800; letter-spacing: 0.06em;
            padding: 1px 5px; border-radius: 4px; margin-top: 5px;
        }
        .pick-live { background: rgba(248,113,113,0.2); color: var(--red); }
        .pick-done { background: rgba(74,222,128,0.15); color: var(--green); }
        .pick-upcoming { background: rgba(139,124,247,0.15); color: var(--accent); }

        /* === GEMMA TACTICAL === */
        .gemma-wrap { max-width: 820px; margin: 1rem auto 0; padding: 0 1.5rem; }
        .gemma-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08), rgba(16, 185, 129, 0.02));
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px; padding: 1rem 1.25rem;
        }
        .gemma-label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: #10b981; margin-bottom: 0.5rem;
        }
        .gemma-obs {
            font-size: 0.85rem; color: var(--text-secondary); padding: 0.25rem 0;
            border-bottom: 1px solid var(--border);
        }
        .gemma-obs:last-child { border-bottom: none; }

        /* === HEADLINE === */
        .headline-wrap {
            max-width: 820px; margin: 1.75rem auto 0; padding: 0 1.5rem;
            text-align: center;
        }
        .headline {
            font-size: 1.55rem; font-weight: 800; letter-spacing: -0.03em;
            line-height: 1.25; color: var(--text);
        }
        .situation {
            margin-top: 0.6rem; font-size: 0.9rem; color: var(--text-3);
            font-weight: 500;
        }

        .section-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 0.75rem;
        }

        /* === THREE-COLUMN MATCH LAYOUT === */
        .match-layout {
            max-width: 1280px; margin: 2.5rem auto 0; padding: 0 1rem;
            display: flex; gap: 16px; align-items: flex-start;
        }
        .match-layout .dressing-section {
            flex: 1; min-width: 0; margin: 0; padding: 0;
        }
        .match-layout:not(.has-wings) {
            max-width: 980px;
        }

        /* === PLAYER PANELS (wings) === */
        .player-panel {
            width: 210px; flex-shrink: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 0.9rem; margin-top: 1.8rem;
        }
        .panel-team {
            font-size: 0.82rem; font-weight: 700; margin-bottom: 0.7rem;
            padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
        }
        .panel-left .panel-team { color: #22d3ee; }
        .panel-right .panel-team { color: var(--amber); }
        .panel-group { margin-bottom: 0.7rem; }
        .panel-group:last-child { margin-bottom: 0; }
        .panel-group-label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text3, var(--text-3));
            margin-bottom: 0.4rem;
        }
        .panel-player-snippet {
            padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .panel-player-snippet:last-child { border-bottom: none; }
        .panel-name-bold {
            display: block; font-size: 0.75rem; font-weight: 600; color: var(--text);
        }
        .panel-snippet {
            display: block; font-size: 0.68rem; color: var(--text-3);
            line-height: 1.4; margin-top: 1px;
        }

        /* === DRESSING ROOM === */
        .dressing-section {
            max-width: 980px; margin: 2.5rem auto 0; padding: 0 1.5rem;
        }
        .dressing-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }
        .coach-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; padding: 1.25rem;
            position: relative;
        }
        .coach-card.coach-home {
            background: linear-gradient(180deg, rgba(34,211,238,0.06), var(--surface));
            border-color: rgba(34,211,238,0.25);
        }
        .coach-card.coach-away {
            background: linear-gradient(180deg, rgba(251,191,36,0.06), var(--surface));
            border-color: rgba(251,191,36,0.25);
        }
        .coach-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 0.9rem;
        }
        .coach-avatar {
            width: 42px; height: 42px; border-radius: 12px;
            background: linear-gradient(135deg, var(--surface-2), var(--border));
            display: grid; place-items: center;
            font-size: 14px; font-weight: 800; color: var(--text);
            flex-shrink: 0;
        }
        .coach-card.coach-home .coach-avatar {
            background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(34,211,238,0.08));
            color: #22d3ee;
        }
        .coach-card.coach-away .coach-avatar {
            background: linear-gradient(135deg, rgba(251,191,36,0.25), rgba(251,191,36,0.08));
            color: var(--amber);
        }
        .coach-team { font-size: 0.92rem; font-weight: 700; letter-spacing: -0.01em; }
        .coach-role { font-size: 0.7rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }

        /* Each coach has three stacked slots with clear visual hierarchy. */
        .coach-slot {
            border-left: 2px solid var(--border);
            padding: 0.65rem 0.85rem;
            margin-top: 0.6rem;
            border-radius: 3px 10px 10px 3px;
            background: rgba(255,255,255,0.015);
        }
        .slot-label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--text-3);
            margin-bottom: 0.25rem;
        }
        .slot-body {
            font-size: 0.88rem; line-height: 1.5; color: var(--text-2);
        }

        /* Hero slot — NEXT OVER — biggest, brightest */
        .coach-slot.slot-now {
            background: rgba(255,255,255,0.04);
        }
        .coach-slot.slot-now .slot-label { color: var(--text); font-size: 10px; }
        .coach-slot.slot-now .slot-body {
            font-size: 1.02rem; font-weight: 600; color: var(--text);
            line-height: 1.4;
        }
        .coach-card.coach-home .coach-slot.slot-now {
            border-left-color: #22d3ee;
            background: linear-gradient(90deg, rgba(34,211,238,0.10), rgba(34,211,238,0.02));
        }
        .coach-card.coach-home .coach-slot.slot-now .slot-label { color: #22d3ee; }
        .coach-card.coach-away .coach-slot.slot-now {
            border-left-color: var(--amber);
            background: linear-gradient(90deg, rgba(251,191,36,0.10), rgba(251,191,36,0.02));
        }
        .coach-card.coach-away .coach-slot.slot-now .slot-label { color: var(--amber); }

        /* Phase slot — NEXT 5 OVERS — medium */
        .coach-slot.slot-phase .slot-body { font-size: 0.85rem; }

        /* Staff slot — smaller, muted, different feel */
        .coach-slot.slot-staff {
            border-left-style: dashed;
            border-left-color: rgba(146,152,173,0.35);
            background: transparent;
            padding-top: 0.5rem; padding-bottom: 0.5rem;
        }
        .coach-slot.slot-staff .slot-label {
            color: var(--text-3);
        }
        .coach-slot.slot-staff .slot-body {
            font-size: 0.78rem; color: var(--text-3);
            font-style: italic;
        }

        /* === PLAYING XI === */
        .xi-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .xi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .xi-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1rem;
        }
        .xi-team-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 0.6rem; }
        .xi-player {
            display: flex; align-items: center; gap: 8px;
            padding: 3px 0; font-size: 0.75rem; color: var(--text-2);
        }
        .xi-num {
            width: 18px; text-align: center;
            font-size: 0.65rem; color: var(--text-3); font-weight: 600;
        }

        /* === PITCH === */
        .pitch-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .pitch-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.1rem;
            font-size: 0.82rem; color: var(--text-2); line-height: 1.6;
        }
        .pitch-card strong { color: var(--text); }

        /* === SOURCES === */
        .sources-section {
            max-width: 800px; margin: 2rem auto 0; padding: 0 1.5rem;
        }
        .sources-list { display: flex; flex-direction: column; gap: 4px; }
        .source-link {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.6rem 0.85rem;
            text-decoration: none; color: var(--text-2);
            font-size: 0.75rem; transition: border-color 0.15s;
        }
        .source-link:hover { border-color: var(--accent); color: var(--text); }
        .source-num {
            font-size: 0.65rem; color: var(--text-3); font-weight: 700;
            font-family: monospace;
        }
        .source-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .source-domain { color: var(--text-3); font-size: 0.68rem; }

        /* === PLAYER SEARCH === */
        .search-wrap {
            max-width: 800px; margin: 0 auto; padding: 0.75rem 1.5rem 0;
            display: none; /* shown only when local API is available */
        }
        .search-bar {
            position: relative;
        }
        .search-input {
            width: 100%; padding: 10px 14px 10px 36px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 0.85rem;
            font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--text-3); }
        .search-input:focus { border-color: var(--accent); }
        .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            font-size: 14px; color: var(--text-3); pointer-events: none;
        }
        .search-results {
            margin-top: 8px;
        }
        .player-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px;
        }
        .player-header {
            display: flex; align-items: baseline; gap: 10px; margin-bottom: 0.6rem;
        }
        .player-name {
            font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em;
        }
        .player-teams {
            font-size: 0.72rem; color: var(--text-3); font-weight: 500;
        }
        .player-traits {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75rem;
        }
        .trait-badge {
            font-size: 0.68rem; font-weight: 700; padding: 3px 10px;
            border-radius: 100px; letter-spacing: 0.02em;
        }
        .trait-green { background: rgba(74,222,128,0.15); color: var(--green); }
        .trait-amber { background: rgba(251,191,36,0.15); color: var(--amber); }
        .trait-cyan { background: rgba(34,211,238,0.15); color: var(--cyan); }
        .trait-red { background: rgba(248,113,113,0.15); color: var(--red); }
        .pressure-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .pressure-stat {
            background: rgba(255,255,255,0.02); border-radius: 10px;
            padding: 0.6rem 0.8rem; text-align: center;
        }
        .pressure-stat .val {
            font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em;
            line-height: 1;
        }
        .pressure-stat .label {
            font-size: 0.65rem; color: var(--text-3); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;
        }
        .pressure-stat.highlight .val { color: var(--green); }
        .pressure-stat.danger .val { color: var(--red); }
        .pressure-stat.neutral .val { color: var(--text); }
        /* === Mode toggle bar (Grok-style) === */
        .mode-toggle {
            display: flex; gap: 4px; margin: 0.5rem 0 0.7rem;
            background: rgba(255,255,255,0.03); border-radius: 10px; padding: 3px;
            border: 1px solid var(--border);
        }
        .mode-btn {
            flex: 1; padding: 6px 0; border: none; border-radius: 8px;
            font-size: 0.72rem; font-weight: 700; cursor: pointer;
            background: transparent; color: var(--text-3);
            font-family: inherit; transition: all 0.2s;
        }
        .mode-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .mode-btn.active[data-mode="fast"] { background: rgba(34,211,238,0.15); color: var(--cyan); }
        .mode-btn.active[data-mode="thinking"] { background: rgba(251,191,36,0.15); color: var(--amber); }
        .mode-btn.active[data-mode="deep"] { background: rgba(139,124,247,0.15); color: var(--accent); }
        .mode-panel { min-height: 40px; }

        .tactical-eye {
            background: linear-gradient(135deg, rgba(139,124,247,0.08), rgba(34,211,238,0.06));
            border: 1px solid rgba(139,124,247,0.2);
            border-radius: 10px; padding: 0.7rem 1rem; margin-bottom: 0.6rem;
            font-size: 0.78rem; line-height: 1.5; color: var(--text-2);
        }
        .tactical-eye .te-label {
            font-size: 0.62rem; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
        }
        .scout-profile {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px; padding: 0.7rem 1rem; margin-top: 0.6rem;
            font-size: 0.78rem; line-height: 1.5; color: var(--text-2);
        }
        .scout-profile .sp-label {
            font-size: 0.62rem; font-weight: 800; color: var(--cyan);
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
        }
        .search-loading {
            text-align: center; color: var(--text-3); padding: 1.5rem;
            font-size: 0.8rem;
        }
        .search-loading::after {
            content: ''; display: inline-block; width: 14px; height: 14px;
            border: 2px solid var(--text-3); border-top-color: var(--accent);
            border-radius: 50%; margin-left: 8px; vertical-align: middle;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .section-divider {
            font-size: 0.7rem; font-weight: 700; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.1em;
            margin: 0.75rem 0 0.5rem; padding-top: 0.6rem;
            border-top: 1px solid var(--border);
        }

        /* === NO MATCHES === */
        .empty-state {
            max-width: 800px; margin: 0 auto; padding: 6rem 1.5rem;
            text-align: center;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.85rem; color: var(--text-3); }

        /* === FOOTER === */
        footer {
            max-width: 800px; margin: 3rem auto 0; padding: 1.25rem 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.7rem; color: var(--text-3);
        }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .brand-mark {
            max-width: 800px; margin: 0 auto; padding: 0 1.5rem 2rem;
            text-align: center; font-size: 0.65rem; color: var(--text-3);
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        .brand-mark strong { color: var(--text-2); font-weight: 600; letter-spacing: 0.12em; }

        /* === RESULT CARD (done matches) === */
        .result-wrap {
            max-width: 820px; margin: 1.25rem auto 0; padding: 0 1.5rem;
        }
        .result-hero {
            background: linear-gradient(135deg, rgba(74,222,128,0.10), rgba(34,211,238,0.04));
            border: 1px solid rgba(74,222,128,0.25);
            border-radius: 18px; padding: 1.5rem 1.75rem;
            text-align: center;
        }
        .result-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.14em; color: var(--green);
            margin-bottom: 0.8rem;
        }
        .result-score {
            font-size: 1.65rem; font-weight: 800; letter-spacing: -0.03em;
            line-height: 1.25; color: var(--text);
        }
        .result-margin {
            margin-top: 0.6rem; font-size: 0.85rem; color: var(--text-2);
            font-weight: 500;
        }
        .result-headline {
            max-width: 820px; margin: 1.5rem auto 0; padding: 0 1.5rem;
            text-align: center;
            font-size: 1.45rem; font-weight: 800; letter-spacing: -0.03em;
            line-height: 1.3;
        }
        .result-panels {
            max-width: 980px; margin: 2rem auto 0; padding: 0 1.5rem;
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }
        .result-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; padding: 1.25rem 1.4rem;
        }
        .result-panel.what-worked {
            background: linear-gradient(180deg, rgba(74,222,128,0.06), var(--surface));
            border-color: rgba(74,222,128,0.25);
        }
        .result-panel.to-improve {
            background: linear-gradient(180deg, rgba(248,113,113,0.05), var(--surface));
            border-color: rgba(248,113,113,0.22);
        }
        .result-panel-header {
            display: flex; align-items: baseline; justify-content: space-between;
            margin-bottom: 0.8rem;
        }
        .result-panel-label {
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .result-panel.what-worked .result-panel-label { color: var(--green); }
        .result-panel.to-improve .result-panel-label { color: var(--red); }
        .result-panel-team {
            font-size: 0.78rem; font-weight: 700; letter-spacing: -0.01em;
            color: var(--text-2);
        }
        .result-bullet {
            display: flex; gap: 10px; padding: 0.55rem 0;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 0.86rem; line-height: 1.45; color: var(--text-2);
        }
        .result-bullet:first-child { border-top: none; padding-top: 0; }
        .result-bullet::before {
            content: ""; flex-shrink: 0;
            width: 6px; height: 6px; border-radius: 50%;
            margin-top: 8px;
        }
        .result-panel.what-worked .result-bullet::before { background: var(--green); }
        .result-panel.to-improve .result-bullet::before { background: var(--red); }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .result-panels { grid-template-columns: 1fr; }
            .result-hero { padding: 1.25rem 1rem; }
            .result-score { font-size: 1.25rem; }
            .result-headline { font-size: 1.15rem; }
            .player-panel { display: none; }
            .match-layout { max-width: 100%; padding: 0 0.5rem; }
            .team-name { font-size: 1.6rem; }
            .vs-block { gap: 0.75rem; }
            .headline { font-size: 1.2rem; }
            .dressing-grid { grid-template-columns: 1fr; }
            .tactical-section { grid-template-columns: 1fr; }
            .hero { padding: 2rem 1rem 0.75rem; }
            .xi-row { grid-template-columns: 1fr; }
            .headline-wrap, .dressing-section, .tactical-section, .xi-section, .pitch-section, .sources-section { padding: 0 1rem; }

            .pick-card { min-width: 130px; max-width: 150px; padding: 0.6rem 0.75rem; }
            .pick-teams { font-size: 0.85rem; }
            footer { padding: 1.25rem 1rem 2rem; flex-direction: column; gap: 4px; text-align: center; }
        }

                ${improve.length ? `
                <div class="result-panel to-improve">
                    <div class="result-panel-header">
                        <span class="result-panel-label">To improve</span>
                        ${loser ? `<span class="result-panel-team">${shortTeam(loser)}</span>` : ""}
                    </div>
                    ${improve.map(b => `<div class="result-bullet">${b}</div>`).join("")}
                </div>` : ""}
            </div>`;
        }
        return html;
    }

    // Live score (for in-progress matches). IDs are suffixed with the match id
    // so multiple live cards on the same page don't collide and pollLiveData
    // can update each one independently.
    if (isLive && m.live_score) {
        html += `
        <div class="live-wrap" data-mid="${mid}">
            <div class="live-card" id="live-card-${mid}">
                <div class="live-badge"><span class="pulse"></span>LIVE</div>
                <div class="live-score" id="live-score-${mid}">${m.live_score}</div>
                <div class="live-details" id="live-details-${mid}">
                    ${m.live_batting ? `<span>&#127951; <strong>${m.live_batting}</strong></span>` : ""}
                    ${m.live_bowling ? `<span>&#9917; <strong>${m.live_bowling}</strong></span>` : ""}
                </div>
                ${m.live_moment ? `<div class="live-moment" id="live-moment-${mid}">${m.live_moment}</div>` : ""}
            </div>
        </div>`;
    }

    // Gemma tactical observations — scoped to THIS match via live_data.json.matches[mid]
    const liveEntry = ((window._liveData || {}).matches || {})[mid] || {};
    const gemmaObs = liveEntry.gemma_observations || [];
    if (isLive && gemmaObs.length > 0) {
        html += `
        <div class="gemma-wrap" data-mid="${mid}">
            <div class="gemma-card" id="gemma-card-${mid}">
                <div class="gemma-label">Tactical Eye</div>
                <div class="gemma-observations">
                    ${gemmaObs.slice(-6).map(o => `<div class="gemma-obs">${o}</div>`).join("")}
                </div>
            </div>
        </div>`;
    }

    // Headline + situation
    if (s.headline) {
        html += `
        <div class="headline-wrap">
            <div class="headline">${s.headline}</div>
            ${s.situation ? `<div class="situation">${s.situation}</div>` : ""}
        </div>`;
    }

    // Three-column layout: Team 1 players | Dressing room | Team 2 players
    const room = s.dressing_room || [];
    const tp = analysis.team_players || {};
    const t1Players = tp[teams[0]] || {};
    const t2Players = tp[teams[1]] || {};

    function renderPlayerPanel(teamName, data, side) {
        const bowlers = (data.bowlers || []).slice(0, 4);
        const batters = (data.batters || []).slice(0, 4);
        if (!bowlers.length && !batters.length) return "";

        function playerSnippet(p) {
            // If we have a tactical snippet, show it (minus the name prefix since we show name separately)
            if (p.snippet) {
                const s = p.snippet;
                const colonIdx = s.indexOf(": ");
                return colonIdx > 0 ? s.substring(colonIdx + 2) : s;
            }
            return "";
        }

        return `
        <div class="player-panel panel-${side}">
            <div class="panel-team">${shortTeam(teamName)}</div>
            ${bowlers.length ? `
            <div class="panel-group">
                <div class="panel-group-label">Bowlers</div>
                ${bowlers.map((b, i) => `
                <div class="panel-player-snippet">
                    <span class="panel-name-bold">${b.name || ""}</span>
                    <span class="panel-snippet">${playerSnippet(b)}</span>
                </div>`).join("")}
            </div>` : ""}
            ${batters.length ? `
            <div class="panel-group">
                <div class="panel-group-label">Batters</div>
                ${batters.map((b, i) => `
                <div class="panel-player-snippet">
                    <span class="panel-name-bold">${b.name || ""}</span>
                    <span class="panel-snippet">${playerSnippet(b)}</span>
                </div>`).join("")}
            </div>` : ""}
        </div>`;
    }

    if (room.length > 0) {
        const leftPanel = renderPlayerPanel(teams[0] || "", t1Players, "left");
        const rightPanel = renderPlayerPanel(teams[1] || "", t2Players, "right");
        const hasWings = leftPanel || rightPanel;

        html += `
        <div class="match-layout ${hasWings ? "has-wings" : ""}">
            ${leftPanel}
            <div class="dressing-section">
                <div class="section-label">${isLive ? "On the boundary rope" : "In the dressing room"} <span id="coach-freshness" style="font-weight:400; color:var(--text-muted); font-size:0.7rem;"></span></div>
                <div class="dressing-grid">
                    ${room.map((c, i) => `
                    <div class="coach-card coach-${i === 0 ? "home" : "away"}">
                        <div class="coach-header">
                            <div class="coach-avatar">${initials(c.team || "?")}</div>
                            <div class="coach-meta">
                                <div class="coach-team">${shortTeam(c.team || "")}</div>
                                <div class="coach-role">Head Coach</div>
                            </div>
                        </div>
                        ${c.next_3_overs ? `
                        <div class="coach-slot slot-now">
                            <div class="slot-label">Next 3 overs</div>
                            <div class="slot-body">${c.next_3_overs}</div>
                        </div>` : ""}
                        ${c.next_5_overs ? `
                        <div class="coach-slot slot-phase">
                            <div class="slot-label">Rest of the phase</div>
                            <div class="slot-body">${c.next_5_overs}</div>
                        </div>` : ""}
                        ${c.to_support_staff ? `
                        <div class="coach-slot slot-staff">
                            <div class="slot-label">To support staff</div>
                            <div class="slot-body">${c.to_support_staff}</div>
                        </div>` : ""}
                    </div>`).join("")}
                </div>
            </div>
            ${rightPanel}
        </div>`;
    }

    // Playing XI (from news)
    const news = analysis.news || {};
    const xi = news.playing_xi || {};
    const xiTeams = Object.keys(xi);
    if (xiTeams.length >= 2) {
        html += `
        <div class="xi-section">
            <div class="section-label">Predicted Playing XI</div>
            <div class="xi-row">
                ${xiTeams.slice(0, 2).map(teamName => `
                <div class="xi-card">
                    <div class="xi-team-name">${shortTeam(teamName)}</div>
                    ${(xi[teamName] || []).map((p, i) => `
                    <div class="xi-player">
                        <span class="xi-num">${i + 1}</span>
                        <span>${p}</span>
                    </div>`).join("")}
                </div>`).join("")}
            </div>
        </div>`;
    }

    // Pitch report (from news)
    if (news.pitch_report) {
        html += `
        <div class="pitch-section">
            <div class="section-label">Pitch & Conditions</div>
            <div class="pitch-card">${news.pitch_report}</div>
        </div>`;
    }

    // Sources (crawled links)
    const sources = (news.sources || []).slice(0, 8);
    if (sources.length > 0) {
        html += `
        <div class="sources-section">
            <div class="section-label">Sources Read &middot; ${sources.length} link${sources.length > 1 ? "s" : ""}</div>
            <div class="sources-list">
                ${sources.map((src, i) => {
                    let domain = "";
                    try { domain = new URL(src.url).hostname.replace(/^www\./, ""); } catch (e) {}
                    return `
                <a class="source-link" href="${src.url}" target="_blank" rel="noopener">
                    <span class="source-num">${String(i + 1).padStart(2, "0")}</span>
                    <span class="source-title">${src.title || src.url}</span>
                    <span class="source-domain">${domain}</span>
                </a>`;
                }).join("")}
            </div>
        </div>`;
    }

    return html;
}

let _currentIdx = 0;

function renderTenantStrip() {
    const strip = document.getElementById("tenant-strip");
    if (!strip || NORM.tenants.length <= 1) { if (strip) strip.innerHTML = ""; return; }
    strip.innerHTML = NORM.tenants.map(t =>
        `<button class="tenant-pill ${t.slug === _activeTenant ? 'tenant-active' : ''}" data-slug="${t.slug}">${t.name}</button>`
    ).join("");
    strip.querySelectorAll(".tenant-pill").forEach(btn => {
        btn.addEventListener("click", () => {
            const slug = btn.dataset.slug;
            if (slug !== _activeTenant) {
                _activeTenant = slug;
                _currentIdx = 0;
                render();
                window.scrollTo(0, 0);
            }
        });
    });
}

function render() {
    const app = document.getElementById("app");
    const analyses = _tenant().analyses || [];
    renderTenantStrip();

    if (analyses.length === 0) {
        app.innerHTML = `
        <div class="empty-state">
            <div class="icon">&#127951;</div>
            <h2>No matches today</h2>
            <p>Check back on match days for AI-powered pre-match intelligence.</p>
        </div>`;
        return;
    }

    // Picker strip (only if multiple matches)
    let picker = "";
    if (analyses.length > 1) {
        picker = `<div class="picker-strip" id="picker-strip">${analyses.map((a, i) => {
            const m = a.match || {};
            const teams = (m.teams || []);
            const t1 = shortTeam(teams[0] || "");
            const t2 = shortTeam(teams[1] || "");
            const st = m.status;
            const cls = st === "live" ? "pick-live" : st === "done" ? "pick-done" : "pick-upcoming";
            const label = st === "live" ? "LIVE" : st === "done" ? "RESULT" : "UPCOMING";
            return `<button class="pick-card ${i === _currentIdx ? 'pick-active' : ''}" data-idx="${i}">
                <div class="pick-teams">${t1} v ${t2}</div>
                <div class="pick-meta">${m.name || ""}</div>
                <span class="pick-status ${cls}">${label}</span>
            </button>`;
        }).join("")}</div>`;
    }

    // Render selected match
    const selected = analyses[_currentIdx] || analyses[0];
    app.innerHTML = picker + renderMatch(selected);

    // Bind picker clicks
    document.querySelectorAll(".pick-card").forEach(card => {
        card.addEventListener("click", () => {
            const idx = parseInt(card.dataset.idx);
            if (idx !== _currentIdx) {
                _currentIdx = idx;
                render();
                window.scrollTo(0, 0);
            }
        });
    });

    // Scroll active card into view
    const active = document.querySelector(".pick-active");
    if (active) active.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
}

// Nav date
function updateNav() {
    const now = new Date();
    document.getElementById("nav-date").textContent =
        now.toLocaleDateString("en-IN", { day: "numeric", month: "short", timeZone: "Asia/Kolkata" }) +
        " \u00b7 " +
        now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Kolkata" }) + " IST";
}

// Poll live_data.json every 30s for real-time score updates.
// live_data.json shape: {"matches": {mid: {match, live_score, ..., gemma_observations}}, ...}
function pollLiveData() {
    fetch("live_data.json?t=" + Date.now())
        .then(r => r.ok ? r.json() : null)
        .then(data => {
            if (!data || !data.matches) return;
            window._liveData = data;

            for (const [mid, entry] of Object.entries(data.matches)) {
                if (!entry || !entry.live_score) continue;
                if ((entry.match || {}).status === "done") continue;

                const scoreEl = document.getElementById("live-score-" + mid);
                const detailsEl = document.getElementById("live-details-" + mid);
                const momentEl = document.getElementById("live-moment-" + mid);

                if (scoreEl) scoreEl.textContent = entry.live_score;
                if (detailsEl) {
                    let h = "";
                    if (entry.live_batting) h += `<span>&#127951; <strong>${entry.live_batting}</strong></span>`;
                    if (entry.live_bowling) h += `<span>&#9917; <strong>${entry.live_bowling}</strong></span>`;
                    detailsEl.innerHTML = h;
                }
                if (momentEl) momentEl.textContent = entry.live_moment || "";

                // Update Gemma observations — scoped to this match only
                const obs = entry.gemma_observations || [];
                if (obs.length === 0) continue;

                let gemmaEl = document.getElementById("gemma-card-" + mid);
                if (gemmaEl) {
                    gemmaEl.querySelector(".gemma-observations").innerHTML =
                        obs.slice(-6).map(o => `<div class="gemma-obs">${o}</div>`).join("");
                } else {
                    // Insert gemma-wrap next to this match's live-wrap
                    const liveWrap = document.querySelector(`.live-wrap[data-mid="${mid}"]`);
                    if (liveWrap) {
                        const div = document.createElement("div");
                        div.className = "gemma-wrap";
                        div.setAttribute("data-mid", mid);
                        div.innerHTML = `
                            <div class="gemma-card" id="gemma-card-${mid}">
                                <div class="gemma-label">Tactical Eye</div>
                                <div class="gemma-observations">
                                    ${obs.slice(-6).map(o => `<div class="gemma-obs">${o}</div>`).join("")}
                                </div>
                            </div>`;
                        liveWrap.after(div);
                    }
                }
            }

            updateNav();
        })
        .catch(() => {});
}

function updateCoachFreshness() {
    const el = document.getElementById("coach-freshness");
    if (!el || !DATA.updated_at) return;
    const pub = new Date(DATA.updated_at);
    if (isNaN(pub)) return;
    const ageMin = Math.max(0, Math.round((new Date() - pub) / 60000));
    el.textContent = ageMin < 1 ? "· just now" : `· ${ageMin}m ago`;
}

updateNav();
render();
updateCoachFreshness();
setInterval(updateCoachFreshness, 30000);

// Poll live data every 30s, full page reload every 5 min (for Claude analysis updates)
setInterval(pollLiveData, 30000);
pollLiveData();
setTimeout(() => location.reload(), 300000);

// === Player Search ===
const searchInput = document.getElementById("player-search");
const searchResults = document.getElementById("search-results");
let _searchTimeout = null;

function traitColor(trait) {
    if (/pressure|chase|ice/.test(trait)) return "trait-green";
    if (/death|finisher|destroyer/.test(trait)) return "trait-red";
    if (/powerplay|fast|bully/.test(trait)) return "trait-cyan";
    return "trait-amber";
}

function srClass(sr, thresh) {
    if (sr >= thresh) return "highlight";
    if (sr < thresh * 0.7) return "danger";
    return "neutral";
}

function renderPlayerCard(p) {
    const bat = p.batting || {};
    const bowl = p.bowling || {};
    const chase = p.chase || {};

    const eName = encodeURIComponent(p.name);
    const safeName = p.name.replace(/'/g, "\\'");

    let html = `<div class="player-card">
        <div class="player-header">
            <span class="player-name">${p.name}</span>
            <span class="player-teams">${(p.teams || []).join(" / ")}</span>
        </div>
        <div class="mode-toggle" id="mt-${eName}">
            <button class="mode-btn active" data-mode="fast" onclick="switchMode('${safeName}','fast')">Fast</button>
            <button class="mode-btn" data-mode="thinking" onclick="switchMode('${safeName}','thinking')">Thinking</button>
            <button class="mode-btn" data-mode="deep" onclick="switchMode('${safeName}','deep')">DeepSearch</button>
        </div>`;

    // === FAST panel (graph stats) ===
    html += `<div class="mode-panel" id="fast-${eName}">`;
    if (bat.innings) {
        html += `<div class="pressure-grid">
            <div class="pressure-stat neutral">
                <div class="val">${bat.innings}</div>
                <div class="label">Innings</div>
            </div>
            <div class="pressure-stat neutral">
                <div class="val">${bat.runs}</div>
                <div class="label">Runs</div>
            </div>
            <div class="pressure-stat neutral">
                <div class="val">${bat.avg || "-"}</div>
                <div class="label">Avg</div>
            </div>
            <div class="pressure-stat ${srClass(bat.sr, 120)}">
                <div class="val">${bat.sr || "-"}</div>
                <div class="label">SR</div>
            </div>
            <div class="pressure-stat ${p.best_score > 40 ? 'highlight' : 'neutral'}">
                <div class="val">${p.best_score || "-"}</div>
                <div class="label">Best</div>
            </div>
            <div class="pressure-stat highlight">
                <div class="val">${bat.sixes || 0}/${bat.fours || 0}</div>
                <div class="label">6s / 4s</div>
            </div>
        </div>`;
        if (p.form && p.form.length) {
            html += `<div style="margin-top:6px;display:flex;align-items:center;gap:6px;">
                <span style="font-size:0.62rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;">Form</span>
                <span style="display:flex;gap:4px;">${p.form.map(r =>
                    `<span style="font-size:0.75rem;font-weight:700;padding:2px 8px;border-radius:6px;
                    background:${r >= 30 ? 'rgba(74,222,128,0.15)' : r >= 15 ? 'rgba(251,191,36,0.1)' : 'rgba(248,113,113,0.1)'};
                    color:${r >= 30 ? 'var(--green)' : r >= 15 ? 'var(--amber)' : 'var(--red)'};">${r}</span>`
                ).join("")}</span>
            </div>`;
        }
    }

    if (chase.innings) {
        html += `<div class="section-divider">Chase</div>
        <div class="pressure-grid">
            <div class="pressure-stat neutral">
                <div class="val">${chase.innings}</div>
                <div class="label">Chase Inn</div>
            </div>
            <div class="pressure-stat ${srClass(chase.sr, 110)}">
                <div class="val">${chase.sr || "-"}</div>
                <div class="label">Chase SR</div>
            </div>
            <div class="pressure-stat neutral">
                <div class="val">${chase.runs}</div>
                <div class="label">Chase Runs</div>
            </div>
        </div>`;
    }

    if (bowl.innings) {
        html += `<div class="section-divider">Bowling</div>
        <div class="pressure-grid">
            <div class="pressure-stat neutral">
                <div class="val">${bowl.innings}</div>
                <div class="label">Innings</div>
            </div>
            <div class="pressure-stat ${bowl.economy < 7 ? 'highlight' : bowl.economy > 10 ? 'danger' : 'neutral'}">
                <div class="val">${bowl.economy || "-"}</div>
                <div class="label">Economy</div>
            </div>
            <div class="pressure-stat neutral">
                <div class="val">${bowl.wickets}</div>
                <div class="label">Wickets</div>
            </div>
        </div>`;
    }

    html += `</div>`; // close fast panel

    // === THINKING panel (Gemma) ===
    html += `<div class="mode-panel" id="thinking-${eName}" style="display:none;">`;
    html += `<div id="te-${eName}">`;
    if (p.tactical_eye) {
        html += `<div class="tactical-eye"><div class="te-label">Tactical Eye</div>${p.tactical_eye}</div>`;
    }
    html += `</div></div>`;

    // === DEEPSEARCH panel (Claude) ===
    html += `<div class="mode-panel" id="deep-${eName}" style="display:none;">`;
    html += `<div id="sp-${eName}">`;
    if (p.scout_profile) {
        html += `<div class="scout-profile"><div class="sp-label">Scout Profile</div>${p.scout_profile}</div>`;
    }
    html += `</div></div>`;

    html += `</div>`;
    return html;
}

function loadTactical(name) {
    const tenant = (_activeTenant || "nacl");
    const eName = encodeURIComponent(name);
    const el = document.getElementById("te-" + eName);
    if (el) el.innerHTML = `<div class="search-loading">Gemma thinking</div>`;
    fetch("/api/players/tactical?name=" + eName + "&tenant=" + tenant)
        .then(r => r.json())
        .then(data => {
            if (el && data.tactical_eye) {
                el.innerHTML = `<div class="tactical-eye"><div class="te-label">Tactical Eye</div>${data.tactical_eye}</div>`;
            } else if (el) {
                el.innerHTML = `<div style="color:var(--text-3);font-size:0.72rem;padding:0.3rem;">No assessment</div>`;
            }
        })
        .catch(() => { if (el) el.innerHTML = ""; });
}

function loadDeepProfile(name) {
    const tenant = (_activeTenant || "nacl");
    const eName = encodeURIComponent(name);
    const el = document.getElementById("sp-" + eName);
    if (el) el.innerHTML = `<div class="search-loading">Claude analyzing</div>`;
    fetch("/api/players/profile?name=" + eName + "&tenant=" + tenant)
        .then(r => r.json())
        .then(p => {
            if (el && p.scout_profile) {
                el.innerHTML = `<div class="scout-profile"><div class="sp-label">Scout Profile</div>${p.scout_profile}</div>`;
            } else if (el) {
                el.innerHTML = `<div style="color:var(--text-3);font-size:0.72rem;padding:0.3rem;">Profile unavailable</div>`;
            }
            // Also update tactical eye if it came back
            if (p.tactical_eye) {
                const te = document.getElementById("te-" + eName);
                if (te && !te.querySelector(".tactical-eye")) {
                    te.innerHTML = `<div class="tactical-eye"><div class="te-label">Tactical Eye</div>${p.tactical_eye}</div>`;
                }
            }
        })
        .catch(() => { if (el) el.innerHTML = ""; });
}

function switchMode(name, mode) {
    const eName = encodeURIComponent(name);
    // Toggle buttons
    const mt = document.getElementById("mt-" + eName);
    if (mt) {
        mt.querySelectorAll(".mode-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.mode === mode);
        });
    }
    // Toggle panels
    ["fast", "thinking", "deep"].forEach(m => {
        const panel = document.getElementById(m + "-" + eName);
        if (panel) panel.style.display = (m === mode) ? "block" : "none";
    });
    // Auto-fetch on first click
    if (mode === "thinking") {
        const te = document.getElementById("te-" + eName);
        if (te && !te.innerHTML.trim()) loadTactical(name);
    }
    if (mode === "deep") {
        const sp = document.getElementById("sp-" + eName);
        if (sp && !sp.innerHTML.trim()) loadDeepProfile(name);
    }
}

// Only enable search when local API is available (not on GitHub Pages)
if (searchInput) {
    fetch("/api/players?q=test").then(r => {
        if (!r.ok) throw new Error();
        document.querySelector(".search-wrap").style.display = "block";
    }).catch(() => {
        document.querySelector(".search-wrap").style.display = "none";
    });
    searchInput.addEventListener("input", () => {
        clearTimeout(_searchTimeout);
        const q = searchInput.value.trim();
        if (q.length < 2) { searchResults.innerHTML = ""; return; }
        const tenant = (_activeTenant || "nacl");
        _searchTimeout = setTimeout(() => {
            searchResults.innerHTML = `<div class="search-loading">Searching graph</div>`;
            fetch("/api/players?q=" + encodeURIComponent(q) + "&tenant=" + tenant)
                .then(r => r.json())
                .then(players => {
                    searchResults.innerHTML = players.length
                        ? players.map(renderPlayerCard).join("")
                        : `<div style="text-align:center;color:var(--text-3);padding:1rem;font-size:0.85rem;">No players found</div>`;
                })
                .catch(() => { searchResults.innerHTML = ""; });
        }, 250);
    });
}
